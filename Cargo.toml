[ package ]
name = "rustdesk-update-adapter"
version = "0.1.0"
edition = "2026"

[ dependencies ]
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
semver = { version = "1.0", features = ["serde"] }
arc-swap = "1.0"
once_cell = "1.18"
http = "1.0"
log = "0.4"          
env_logger = "0.10"  
dotenv = "0.15"