name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Build
      uses: actions-rs/cargo@v1
      with:
        command: build
        args: --release

    - name: Run tests
      uses: actions-rs/cargo@v1
      with:
        command: test

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-update-adapter
        path: target/release/rustdesk-update-adapter

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check if GHCR is available
      id: check_ghcr
      run: |
        # 尝试访问 GHCR，检查权限
        if docker pull ghcr.io/${{ github.repository_owner }}/rustdesk-update-api:latest 2>/dev/null; then
          echo "ghcr_available=true" >> $GITHUB_OUTPUT
        else
          echo "ghcr_available=false" >> $GITHUB_OUTPUT
        fi

    - name: Extract version tag
      id: extract_tag
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build and push to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/rustdesk-update-api:${{ steps.extract_tag.outputs.tag }}
          ${{ secrets.DOCKERHUB_USERNAME }}/rustdesk-update-api:latest

    - name: Build and push to GitHub Container Registry (if available)
      if: steps.check_ghcr.outputs.ghcr_available == 'true'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/rustdesk-update-api:${{ steps.extract_tag.outputs.tag }}
          ghcr.io/${{ github.repository_owner }}/rustdesk-update-api:latest

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v3

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: rustdesk-update-adapter

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: rustdesk-update-adapter
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
